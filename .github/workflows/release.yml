name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci-verification:
    name: CI Verification
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write

  publish:
    needs: ci-verification
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-21-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-21-
            ${{ runner.os }}-m2-

      - name: Get version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
          else
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_check
        if: steps.version.outputs.is_snapshot == 'false' && github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build artifacts for JReleaser
        if: steps.version.outputs.is_snapshot == 'false' && github.event_name == 'workflow_dispatch' && steps.tag_check.outputs.exists == 'false'
        run: |
          mvn -DskipTests=true clean package -Pwindows-exe
          cat src/bin/lucli.sh target/lucli.jar > target/lucli
          chmod +x target/lucli
          rm -f target/lucli-windows.zip
          zip -j target/lucli-windows.zip target/lucli.exe
          # Legacy asset names (released as files.artifacts in jreleaser.yml).
          # Every release up to v0.3.17 shipped these names and downstream
          # consumers (Wheels CI, Homebrew formulas, Scoop manifests, the
          # bootstrap installer) pin them.
          VERSION="${{ steps.version.outputs.VERSION }}"
          cp target/lucli     "target/lucli-$VERSION-linux"
          cp target/lucli     "target/lucli-$VERSION-macos"
          cp target/lucli.exe "target/lucli-$VERSION.exe"
          cp target/lucli.jar "target/lucli-$VERSION.jar"

      - name: Publish GitHub release, Homebrew tap, and Scoop bucket with JReleaser
        if: steps.version.outputs.is_snapshot == 'false' && github.event_name == 'workflow_dispatch' && steps.tag_check.outputs.exists == 'false'
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.JRELEASER_GITHUB_TOKEN || secrets.HOMEBREW_TAP_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ secrets.JRELEASER_HOMEBREW_GITHUB_TOKEN || secrets.HOMEBREW_TAP_TOKEN || secrets.JRELEASER_GITHUB_TOKEN }}
          JRELEASER_SCOOP_GITHUB_TOKEN: ${{ secrets.JRELEASER_SCOOP_GITHUB_TOKEN || secrets.JRELEASER_GITHUB_TOKEN || secrets.HOMEBREW_TAP_TOKEN }}
        run: mvn -DskipTests=true -Djreleaser.config.file=jreleaser.yml jreleaser:full-release

      - name: Build JAR for Docker image
        if: steps.version.outputs.is_snapshot == 'false' && github.event_name == 'workflow_dispatch' && steps.tag_check.outputs.exists == 'false'
        run: mvn -DskipTests=true package

      - name: Set up Docker Buildx
        if: steps.version.outputs.is_snapshot == 'false' && github.event_name == 'workflow_dispatch' && steps.tag_check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version.outputs.is_snapshot == 'false' && github.event_name == 'workflow_dispatch' && steps.tag_check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.version.outputs.is_snapshot == 'false' && github.event_name == 'workflow_dispatch' && steps.tag_check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm64/v8
          tags: |
            markdrew/lucli:${{ steps.version.outputs.VERSION }}
            markdrew/lucli:latest
