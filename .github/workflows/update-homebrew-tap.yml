name: Update Homebrew tap (LuCLI)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish to Homebrew tap (e.g. v0.3.17)'
        required: true
        type: string

jobs:
  update-tap-release:
    if: ${{ github.event_name == 'release' }}
    uses: cybersonic/homebrew-tap/.github/workflows/update-formula.yml@main
    with:
      formula_name: lucli
      formula_type: os_split
      release_repo: cybersonic/LuCLI
      version: ${{ github.event.release.tag_name }}
    secrets:
      tap_repo_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  update-tap-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: cybersonic/homebrew-tap/.github/workflows/update-formula.yml@main
    with:
      formula_name: lucli
      formula_type: os_split
      release_repo: cybersonic/LuCLI
      version: ${{ inputs.version }}
    secrets:
      tap_repo_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}