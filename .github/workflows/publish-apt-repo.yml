name: Publish APT Repository

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v0.6.2)
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-apt-repo:
    if: ${{ secrets.APT_GPG_PRIVATE_KEY != '' }}
    runs-on: ubuntu-latest
    outputs:
      apt_repo_dir: ${{ steps.create_repo.outputs.dir }}
      apt_keyring: ${{ steps.create_repo.outputs.keyring }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Debian assets from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/deb
          gh release download "${{ steps.tag.outputs.value }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.deb" \
            --dir dist/deb
          ls -la dist/deb

      - name: Build APT repository payload
        id: create_repo
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: lucli
          scan-dir: dist/deb
          codename: stable
          components: main
          architectures: amd64
          signing-key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          signing-key-passphrase: ${{ secrets.APT_GPG_PASSPHRASE }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.create_repo.outputs.dir }}

  deploy-apt-repo:
    needs: build-apt-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
