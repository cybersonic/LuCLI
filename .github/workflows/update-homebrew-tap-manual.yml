name: Update Homebrew tap (LuCLI) - Manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish to Homebrew tap (e.g. v0.3.17)'
        required: true
        type: string
permissions:
  contents: write
  pull-requests: write

jobs:
  update-tap:
    uses: cybersonic/homebrew-tap/.github/workflows/update-formula.yml@main
    with:
      formula_name: lucli
      formula_type: os_split
      release_repo: cybersonic/LuCLI
      version: ${{ github.event.inputs.version }}
    secrets:
      tap_repo_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
