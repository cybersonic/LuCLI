project:
  # These can be omitted; Maven plugin will fill in from pom.xml.
  name: LuCLI
  description: A CLI for Lucee
  authors:
    - Mark Drew
  license: MIT
  copyright: 2025 Mark Drew
  links:
    homepage: https://lucli.dev/
    documentation: https://lucli.dev/docs/

release:
  github:
    owner: cybersonic
    name: LuCLI


distributions:
  lucli:
    type: BINARY
    executable:
      name: lucli
    artifacts:
      - path: target/lucli
        platform: osx-x86_64
      - path: target/lucli
        platform: osx-aarch_64
      - path: target/lucli
        platform: linux-x86_64
      - path: target/lucli-windows.zip
        platform: windows-x86_64

# Legacy asset names, kept for backward compatibility. Existing consumers
# (Wheels CI, the wheels Homebrew formula, the scoop-wheels bucket, and the
# bootstrap installer) download these exact names from every release up to
# v0.3.17. The release workflow copies the built artifacts to these names
# before invoking JReleaser.
files:
  artifacts:
    - path: target/lucli-{{projectVersion}}-linux
    - path: target/lucli-{{projectVersion}}-macos
    - path: target/lucli-{{projectVersion}}.exe
    - path: target/lucli-{{projectVersion}}.jar
    - path: target/lucli_{{projectVersion}}_amd64.deb
    - path: target/lucli.jar

packagers:
  brew:
    # Enable Homebrew packaging for all distributions
    active: ALWAYS
    repository:
      owner: cybersonic
      name: homebrew-tap
  scoop:
    active: ALWAYS
    repository:
      owner: cybersonic
      name: scoop-bucket
